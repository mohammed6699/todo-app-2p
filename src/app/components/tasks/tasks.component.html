<section appPageStyle>
    <!-- Search Bar -->
    <div class="flex flex-col md:flex-row justify-center items-baseline gap-4 mb-8 w-full px-4">
    <input
        [(ngModel)]="searchLogic"
        type="text"
        placeholder="Search tasks..."
        class="w-full mt-8 max-w-xl bg-slate-900/70 text-gray-100 border border-slate-700 rounded-2xl px-4 py-3 
            placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 shadow-md"
    />
    <select
        [(ngModel)]="filterTask"
        (ngModelChange)="filterMethod()"
        type="text"
        placeholder="filter tasks by status..."
        class="bg-slate-900/70 text-gray-100 border border-slate-700 rounded-2xl px-4 py-3 focus:outline-none
      focus:ring-2 focus:ring-emerald-500 shadow-md cursor-pointer"
    >
    <option value="all">all</option>
    <option value="done">Done</option>
    <option value="In progress">In Progress</option>
    <option value="pendding">Pending</option>
    </select>
    
    </div>
    <div class="flex justify-end mb-2 mr-8">
            <button
        (click)="navigateToAdd()"
        class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-semibold
            shadow-md hover:shadow-emerald-500/25 transition-all duration-200"
        >
        Add New Task
        </button>
    </div>
    <div
    class="w-full h-full grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-8 px-6 py-10"
    >
    @for (task of searchTasks; track task.id) {
        
        <div
        appCardStyle
        >
        <div class="p-6 flex flex-col justify-between h-64">
            <h3
            class="text-2xl font-semibold mb-2 text-white "
            >
            {{ task.name | wordUpper}}
            </h3>

            <p class="text-sm text-white mb-4 line-clamp-3">
            {{ task.description | lowercase}}
            </p>

            <div class="flex justify-between items-center text-white text-sm mb-4">
            <h4 class="font-medium text-White">Status:</h4>
            <p>{{ task.status | lowercase}}</p>
            </div>

            <div class="flex justify-between sm:flex gap-5">
            <button
                [routerLink]="['/tasks', task.id]"
                class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-semibold
                    shadow-md hover:shadow-emerald-500/25 transition-all duration-200"
            >
                View Details →
            </button>
            <button 
            (click)="deleteTask(task.id)"
            class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-semibold
                    shadow-md hover:shadow-emerald-500/25 transition-all duration-200">
                delete task
            </button>
            </div>
        </div>
        </div>
    } @empty {
        <p class="text-red-400 font-bold text-center flex justify-center">Please check your server</p>
    }
    </div>
</section>
