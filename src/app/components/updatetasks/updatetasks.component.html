 <div appAddUpdateStyle>
 <!-- <div class="flex flex-wrap justify-center w-auto items-center min-h-screen bg-linear-to-r/decreasing from-indigo-500 to-teal-400"> -->
  <div class="border border-slate-700 shadow-2xl max-w-md w-full p-8 rounded-2xl backdrop-blur-sm ">
    <h2 class="text-3xl font-extrabold text-white mb-2 text-center">
      Update your existing task
    </h2>
    <form class="mt-4 mb-2 w-full"  (ngSubmit)="updateTaskMethod()" [formGroup]="updateTaskForm" #updateForm="ngForm">
      <div appAddUpdateCardStyle>
        <div>
          <label class="block text-sm font-semibold text-white mb-2">
            Task Title
          </label>
          <input
            type="text"
            placeholder="Play football"
            class="w-full border bg-gray-100 border-gray-700/15 rounded-lg px-4 py-3 font-bold text-gray-500
                focus:outline-none focus:border-emerald-500 transition-all duration-200"
            formControlName="name"
          />
        </div>
        <div>
          <label class="block text-sm font-semibold text-white mb-2">
            Description
          </label>
          <input
            type="text"
            placeholder="Describe your task the way you like"
            class="w-full bg-gray-100 border border-slate-700 rounded-lg px-4 py-3 font-bold text-gray-500/70
                focus:outline-none focus:border-emerald-500 transition-all duration-200"
            formControlName="description"
          />
        </div>
        <div>
          <label class="block text-sm font-semibold text-white mb-2">
            Summary
          </label>
          <input
            type="text"
            placeholder="Summarize your task with few words"
            class="w-full bg-gray-100 border border-slate-700 rounded-lg px-4 py-3 font-bold text-gray-500/70
                focus:outline-none focus:border-emerald-500 transition-all duration-200"
            formControlName="summary"
          />
        </div>
        <div>
          <label class="block text-sm font-semibold text-white mb-2">
            Progress
          </label>
          <select
            class="w-full bg-gray-100 border border-slate-700 rounded-lg px-4 py-3 font-bold text-gray-500/70
                focus:outline-none focus:border-emerald-500 transition-all duration-200 cursor-pointer"
            formControlName="status"
          >
            <option value="pendding" class="text-gray-700">Pending</option>
            <option value="In progress" class="text-gray-700">In progress</option>
            <option value="done" class="text-gray-700">Done</option>
          </select>
        </div>
      </div>
      <div class="flex justify-around">
        <button
      [disabled]="updateTaskForm.invalid"
        type="submit"
        class="w-auto bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-lg font-semibold text-sm shadow-lg
            transition-all duration-300 mt-4 px-5"
      >
        update task
      </button>
      <button
      [routerLink]="['/tasks']"
      class="w-auto bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-lg font-semibold text-sm shadow-lg
            transition-all duration-300 mt-4 px-6"
      >
      ← Back to Tasks
    </button>
      </div>
    </form>
  </div>
</div>
