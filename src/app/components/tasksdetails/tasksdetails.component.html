<!-- <div class="w-full min-h-screen flex items-center justify-center px-4 py-16 bg-linear-to-r/oklab from-indigo-500 to-teal-400"> -->
<div class="w-full min-h-screen flex items-center justify-center px-4 py-16 bg-[linear-gradient(135deg,theme(colors.indigo.600),theme(colors.cyan.400))]">
  <div
    class="w-full max-w-4xl backdrop-blur-xl border border-slate-700 rounded-3xl shadow-2xl overflow-hidden"
  >
    <div class="p-10 border-b border-slate-700 bg-linear-to-r from-emerald-400/10 to-teal-400/10">
      <h1
        class="pb-2 text-3xl font-bold text-white bg-clip-text bg-linear-to-r from-emerald-400 to-teal-300"
      >
        {{ task?.name || 'Task Title' }}
      </h1>
      <p class="mt-3 text-white text-sm tracking-wide uppercase">
        Task ID: {{ task?.id || taskId }}
      </p>
    </div>

    <div class="p-10 space-y-6">
      <div>
        <h2 class="text-xl font-semibold text-white mb-2">Description</h2>
        <p class="text-white leading-relaxed text-base">
          {{ task?.description || 'No description available for this task.' }}
        </p>
      </div>

      <div>
        <h2 class="text-xl font-semibold text-white mb-2">Summary</h2>
        <p class="text-white leading-relaxed text-base">
          {{ task?.summary || 'No summary provided for this task.' }}
        </p>
      </div>

      <div>
        <h2 class="text-xl font-semibold text-white mb-2">Status</h2>
        <p class="text-white leading-relaxed text-base">
          {{ task?.status || 'No status provided for this task.' }}
        </p>
      </div>

      <div class="pt-6 border-t border-slate-700 flex justify-end gap-4">
        <button
          [routerLink]="['/update-task', taskId]"
          class="bg-blue-500 hover:bg-blue-600 text-white font-semibold px-6 py-3 rounded-xl shadow-lg hover:shadow-blue-500/25 transition-all duration-200"
        >
          Update Task
        </button>
        <button
          [routerLink]="['/tasks']"
          class="bg-emerald-500 hover:bg-emerald-600 text-white font-semibold px-6 py-3 rounded-xl shadow-lg hover:shadow-emerald-500/25 transition-all duration-200"
        >
          ← Back to Tasks
        </button>
      </div>
    </div>
  </div>
</div>
