<!-- <div class="w-full min-h-screen flex items-center justify-center px-4 py-16 bg-linear-to-r/oklab from-indigo-500 to-teal-400"> -->
<div class="w-full min-h-screen flex items-center justify-center px-4 py-16 bg-[#caf0f8]">
  <div
    class="w-full max-w-4xl backdrop-blur-xl border border-slate-700 rounded-3xl shadow-2xl overflow-hidden"
  >
    <div class="p-10 border-b border-slate-700 bg-linear-to-r from-emerald-400/10 to-teal-400/10">
      <h1
        class="pb-2 text-3xl font-bold text-[#03045e] bg-clip-text bg-linear-to-r from-emerald-400 to-teal-300"
      >
        {{ task.name  | titlecase}}
      </h1>
      <p class="mt-3 text-[#03045e] text-sm tracking-wide uppercase">
        Task ID: {{ task.id || taskId }}
      </p>
    </div>

    <div class="p-10 space-y-6">
      <div>
        <h2 class="text-xl font-semibold text-[#03045e] mb-2">User Email</h2>
        <p class="text-[#03045e] leading-relaxed text-base">
          {{ task.email | lowercase}}
        </p>
      </div>

      <div>
        <h2 class="text-xl font-semibold text-[#03045e] mb-2">Summary</h2>
        <p class="text-[#03045e] leading-relaxed text-base">
          {{ task.summary | lowercase }}
        </p>
      </div>
      <div>
        <h2 class="text-xl font-semibold text-[#03045e] mb-2">Phone Number</h2>
        <p class="text-[#03045e] leading-relaxed text-base">
          {{ task.phone }}
        </p>
      </div>
      <div>
        <h2 class="text-xl font-semibold text-[#03045e] mb-2">Status</h2>
        <p class="text-[#03045e] leading-relaxed text-base">
          {{ task.status | lowercase}}
        </p>
      </div>

      <div class="pt-6 border-t border-slate-700 flex justify-end gap-4">
        <button
          [routerLink]="['/tasks']"
          class="bg-[#ade8f4]  text-[#03045e] font-semibold px-6 py-3 rounded-xl shadow-lg hover:shadow-emerald-500/25 transition-all duration-200"
        >
          Back to Tasks
        </button>
      </div>
    </div>
  </div>
</div>
