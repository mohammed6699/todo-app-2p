<div class="bg-cover bg-center bg-fixed" style="background-image: url('https://picsum.photos/1920/1080')">
    <div class="h-screen flex justify-center items-center">
        <div class="bg-white mx-4 p-8 rounded shadow-md w-full md:w-1/2 lg:w-1/3">
            <h1 class="text-3xl font-bold mb-8 text-center">Login</h1>
            <!-- template driven -->
            <form (ngSubmit)="addUser()" #loginForm="ngForm">
                <div class="mb-4">
                    <label class="block font-semibold text-gray-700 mb-2" for="email">
                        Email Address
                    </label>
                    <input
                        class="border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                        [ngClass]="{'border-red-500': emailInput.invalid && (emailInput.touched || emailInput.dirty)}"
                        id="email"
                        type="email" 
                        placeholder="Enter your email address" 
                        [(ngModel)]="loginUser.email"
                        name="email"
                        required
                        email
                        #emailInput="ngModel"
                        />
                    <div *ngIf="emailInput.invalid && (emailInput.touched || emailInput.dirty)" class="text-red-500 text-xs mt-1">
                        <span *ngIf="emailInput.errors?.['required']">Email is required.</span>
                        <span *ngIf="emailInput.errors?.['email']">Enter a valid email address.</span>
                    </div>
                    </div>
                    <div class="mb-4">
                    <label class="block font-semibold text-gray-700 mb-2" for="password">
                        Password
                    </label>
                    <input
                        class="border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline"
                        [ngClass]="{'border-red-500': passwordInput.invalid && (passwordInput.touched || passwordInput.dirty)}"
                        id="password" 
                        type="password" 
                        placeholder="Enter your password" 
                        [(ngModel)]="loginUser.password"
                        name="password" 
                        required
                        minlength="6"
                        #passwordInput="ngModel"/>
                    <div *ngIf="passwordInput.invalid && (passwordInput.touched || passwordInput.dirty)" class="text-red-500 text-xs mt-1">
                        <span *ngIf="passwordInput.errors?.['required']">Password is required.</span>
                        <span *ngIf="passwordInput.errors?.['minlength']">Password must be at least 6 characters long.</span>
                    </div>
                    
                </div>
                <div class="mb-6">
                    <button
                        class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                        type="submit"
                        [disabled]="loginForm.invalid">
                        Login
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
